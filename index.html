<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clicity · Manizales</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #F1F3F6; color: #0D1B3D; }
    input, button { font-family: inherit; }
    input::placeholder { color: #bbb; }
    button { cursor: pointer; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    /* ── LAYOUT ── */
    #app { min-height: 100vh; }
    .header { position: sticky; top: 0; z-index: 10; background: #fff; border-bottom: 1px solid #E3F0FF; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; height: 54px; }
    .logo { background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-icon { width: 30px; height: 30px; background: #0D1B3D; border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-icon svg { width: 18px; height: 18px; }
    .logo-name { font-weight: 800; font-size: 17px; color: #2D8CFF; letter-spacing: -0.3px; }
    .logo-tag { font-size: 10px; color: #888; background: #E5E8EC; border-radius: 4px; padding: 2px 6px; }
    .btn-register { font-size: 12px; font-weight: 600; color: #2D8CFF; background: #E3F0FF; border: none; border-radius: 8px; padding: 7px 13px; }
    .page { max-width: 660px; margin: 0 auto; padding: 28px 20px 60px; }

    /* ── BUSCAR ── */
    .hero { text-align: center; margin-bottom: 28px; }
    .hero-city { font-size: 12px; color: #2D8CFF; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 10px; }
    .hero-h1 { font-size: 28px; font-weight: 800; color: #0D1B3D; line-height: 1.2; margin-bottom: 8px; letter-spacing: -0.4px; }
    .hero-sub { font-size: 14px; color: #666; }
    .searchbar { background: #fff; border-radius: 14px; border: 2px solid #2D8CFF; display: flex; align-items: center; padding: 4px 4px 4px 14px; margin-bottom: 18px; box-shadow: 0 4px 20px rgba(60,52,137,.07); }
    .searchbar-icon { font-size: 17px; margin-right: 8px; }
    .searchbar input { flex: 1; border: none; outline: none; font-size: 13px; background: transparent; color: #0D1B3D; }
    .btn-search { background: #2D8CFF; color: #fff; border: none; border-radius: 11px; padding: 10px 20px; font-weight: 700; font-size: 13px; white-space: nowrap; }
    .section-label { font-size: 11px; color: #888; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 9px; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 26px; }
    .chip { font-size: 12px; color: #2D8CFF; background: #E3F0FF; border: none; border-radius: 20px; padding: 6px 13px; font-weight: 500; }
    .chip:hover { background: #C7E2FF; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .comercio-card { background: #fff; border: 1px solid #E3F0FF; border-radius: 13px; padding: 14px; text-align: left; border-width: 1px; transition: border-color .15s; }
    .comercio-card:hover { border-color: #2D8CFF; }
    .cat-badge { font-size: 10px; color: #0C8C7E; font-weight: 600; background: #DFFAF7; border-radius: 5px; padding: 2px 7px; display: inline-block; margin-bottom: 6px; }
    .comercio-nombre { font-weight: 700; font-size: 13px; color: #0D1B3D; margin-bottom: 2px; }
    .comercio-stars { font-size: 11px; color: #888; }
    .result-card { background: #fff; border: 1px solid #E3F0FF; border-radius: 13px; padding: 13px 15px; margin-bottom: 9px; display: flex; gap: 13px; align-items: center; }
    .result-emoji { font-size: 30px; width: 50px; height: 50px; background: #F1F3F6; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; overflow: hidden; }
    .result-emoji img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
    .result-info { flex: 1; min-width: 0; }

    /* ── AGENTE PERSONAL (home conversacional) ── */
    .agent-hero { text-align: center; padding-top: 18px; }
    .loc-pill { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; color: #0C8C7E; background: #DFFAF7; border: none; border-radius: 20px; padding: 6px 14px; margin-bottom: 22px; cursor: pointer; }
    .agent-h1 { font-size: 30px; font-weight: 800; color: #0D1B3D; letter-spacing: -0.5px; margin-bottom: 8px; }
    .agent-sub { font-size: 14px; color: #666; margin-bottom: 26px; }
    .agent-box { background: #fff; border: 2px solid #2D8CFF; border-radius: 20px; padding: 16px; box-shadow: 0 8px 28px rgba(45,140,255,.10); text-align: left; margin-bottom: 22px; }
    .agent-box textarea { width: 100%; border: none; outline: none; resize: none; font-size: 15px; font-family: inherit; color: #0D1B3D; background: transparent; min-height: 52px; line-height: 1.5; }
    .agent-box-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 10px; border-top: 1px solid #F1F3F6; }
    .mic-btn { width: 38px; height: 38px; border-radius: 50%; border: 1px solid #E3F0FF; background: #F1F3F6; font-size: 16px; flex-shrink: 0; }
    .mic-btn.listening { background: #FFE3E3; border-color: #FF6B6B; animation: pulse 1s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    .btn-send-agent { background: #2D8CFF; color: #fff; border: none; border-radius: 12px; padding: 10px 22px; font-weight: 700; font-size: 14px; }
    .agent-examples { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
    .example-card { background: #fff; border: 1px solid #E3F0FF; border-radius: 12px; padding: 12px 16px; text-align: left; font-size: 13px; color: #333; display: flex; align-items: center; gap: 10px; }
    .example-card:hover { border-color: #2D8CFF; background: #F7FAFF; }
    .example-card .ic { font-size: 15px; flex-shrink: 0; }
    .link-explorar { display: inline-block; margin-top: 22px; font-size: 12px; color: #888; background: none; border: none; font-weight: 600; }
    .link-explorar:hover { color: #2D8CFF; }

    /* ── HILO DE CONVERSACIÓN DEL AGENTE ── */
    .agent-thread-wrap { padding-top: 6px; }
    .agent-thread { display: flex; flex-direction: column; gap: 14px; margin-bottom: 90px; }
    .agent-msg-row { display: flex; }
    .agent-msg-row.user { justify-content: flex-end; }
    .agent-bubble { max-width: 78%; padding: 11px 16px; font-size: 14px; line-height: 1.55; }
    .agent-bubble.assistant { background: #fff; color: #0D1B3D; border-radius: 4px 16px 16px 16px; border: 1px solid #E3F0FF; }
    .agent-bubble.user { background: #2D8CFF; color: #fff; border-radius: 16px 16px 4px 16px; }
    .agent-typing { display: flex; gap: 4px; padding: 6px 0; }
    .rec-intro { font-size: 13px; color: #666; margin-bottom: 10px; }
    .rec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .rec-card { background: #fff; border: 1px solid #E3F0FF; border-radius: 14px; padding: 14px; text-align: left; transition: all .15s; }
    .rec-card:hover { border-color: #2D8CFF; box-shadow: 0 6px 18px rgba(45,140,255,.12); transform: translateY(-1px); }
    .rec-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
    .rec-stars { font-size: 11px; color: #888; font-weight: 600; }
    .rec-nombre { font-weight: 700; font-size: 14px; color: #0D1B3D; margin-bottom: 4px; }
    .rec-agente { font-size: 11px; color: #7B5CF6; font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .rec-razon { font-size: 12px; color: #666; line-height: 1.4; margin-bottom: 8px; min-height: 32px; }
    .rec-precio { font-size: 13px; font-weight: 800; color: #2D8CFF; }
    .agent-input-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #E3F0FF; padding: 12px 20px; display: flex; justify-content: center; }
    .agent-input-bar-inner { max-width: 660px; width: 100%; display: flex; gap: 8px; align-items: center; }
    .agent-input-bar input { flex: 1; border: 1px solid #E3F0FF; border-radius: 12px; padding: 11px 14px; font-size: 14px; outline: none; }
    .agent-input-bar input:focus { border-color: #2D8CFF; }
    .mic-btn-sm { width: 40px; height: 40px; border-radius: 10px; border: 1px solid #E3F0FF; background: #F1F3F6; font-size: 15px; flex-shrink: 0; }
    .btn-send-agent-sm { background: #2D8CFF; color: #fff; border: none; border-radius: 10px; padding: 10px 18px; font-weight: 700; font-size: 13px; flex-shrink: 0; }
    .result-nombre { font-weight: 700; font-size: 13px; color: #0D1B3D; margin-bottom: 2px; }
    .result-comercio { font-size: 11px; color: #666; margin-bottom: 6px; }
    .result-price { font-weight: 800; font-size: 15px; color: #2D8CFF; margin-right: 8px; }
    .stock-badge { font-size: 10px; color: #0C8C7E; background: #DFFAF7; border-radius: 5px; padding: 2px 6px; font-weight: 600; }
    .btn-ver { background: #2D8CFF; color: #fff; border: none; border-radius: 9px; padding: 8px 13px; font-size: 11px; font-weight: 700; white-space: nowrap; }
    .empty-state { text-align: center; padding: 40px 0; color: #888; }
    .empty-state .icon { font-size: 30px; margin-bottom: 8px; }
    .empty-state .title { font-size: 14px; font-weight: 600; color: #444; margin-bottom: 4px; }
    .loading { text-align: center; padding: 36px 0; color: #888; font-size: 13px; }

    /* ── PERFIL ── */
    .back-btn { font-size: 12px; color: #2D8CFF; background: none; border: none; font-weight: 600; padding: 0 0 16px; display: flex; align-items: center; gap: 3px; }
    .perfil-header { background: #fff; border: 1px solid #E3F0FF; border-radius: 14px; padding: 18px; margin-bottom: 14px; }
    .perfil-nombre { font-size: 19px; font-weight: 800; color: #0D1B3D; margin: 6px 0 4px; }
    .perfil-titulo-row { display: flex; align-items: center; gap: 12px; }
    .perfil-logo { width: 48px; height: 48px; border-radius: 10px; object-fit: contain; background: #0D1B3D; padding: 6px; flex-shrink: 0; }
    .perfil-desc { font-size: 12px; color: #666; margin-bottom: 12px; line-height: 1.5; }
    .perfil-meta { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; font-size: 11px; color: #555; }
    .wa-link { color: #25D366; font-weight: 600; text-decoration: none; }
    .productos-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 18px; }
    .prod-card { background: #fff; border: 1px solid #E3F0FF; border-radius: 11px; padding: 11px; }
    .prod-emoji { font-size: 22px; margin-bottom: 5px; height: 36px; display: flex; align-items: center; }
    .prod-emoji img { width: 100%; height: 64px; object-fit: cover; border-radius: 8px; margin-bottom: 2px; }
    .prod-nombre { font-weight: 600; font-size: 11px; color: #0D1B3D; line-height: 1.3; margin-bottom: 4px; }
    .prod-precio { font-weight: 800; font-size: 12px; color: #2D8CFF; }

    /* ── CHAT ── */
    .chat-box { background: #fff; border: 2px solid #2D8CFF; border-radius: 14px; overflow: hidden; }
    .chat-header { background: linear-gradient(135deg, #7B5CF6 0%, #2D8CFF 100%); padding: 11px 15px; display: flex; align-items: center; gap: 9px; }
    .chat-avatar { width: 26px; height: 26px; background: rgba(255,255,255,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .chat-header-title { color: #fff; font-weight: 700; font-size: 12px; }
    .chat-header-sub { color: rgba(255,255,255,.7); font-size: 10px; }
    .chat-messages { height: 250px; overflow-y: auto; padding: 13px; }
    .msg-row { margin-bottom: 10px; display: flex; }
    .msg-row.user { justify-content: flex-end; }
    .msg-bubble { max-width: 80%; padding: 9px 13px; font-size: 12px; line-height: 1.5; }
    .msg-bubble.assistant { background: #F1F3F6; color: #0D1B3D; border-radius: 13px 13px 13px 3px; border: 1px solid #E3F0FF; }
    .msg-bubble.user { background: #2D8CFF; color: #fff; border-radius: 13px 13px 3px 13px; }
    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #2D8CFF; opacity: .4; animation: bounce .9s infinite; }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }
    .chat-input-row { border-top: 1px solid #E3F0FF; padding: 9px 11px; display: flex; gap: 7px; }
    .chat-input { flex: 1; border: 1px solid #E3F0FF; border-radius: 9px; padding: 8px 11px; font-size: 12px; outline: none; background: #F1F3F6; }
    .chat-input:focus { border-color: #2D8CFF; }
    .btn-send { background: #2D8CFF; color: #fff; border: none; border-radius: 9px; padding: 8px 15px; font-weight: 700; font-size: 12px; }
    .btn-send:disabled { opacity: .5; }
    .chat-chips { padding: 5px 11px 9px; display: flex; gap: 5px; flex-wrap: wrap; }
    .chat-chip { font-size: 10px; border: none; border-radius: 20px; padding: 3px 9px; font-weight: 500; }
    .chat-chip.order { color: #0C8C7E; background: #DFFAF7; font-weight: 700; }
    .chat-chip.info { color: #2D8CFF; background: #E3F0FF; }

    /* ── ORDEN CARD ── */
    .orden-card { background: #fff; border: 2px solid #0C8C7E; border-radius: 13px; padding: 14px 15px; font-size: 12px; margin-bottom: 10px; }
    .orden-title { font-weight: 700; color: #0C8C7E; font-size: 13px; margin-bottom: 10px; }
    .orden-row { display: flex; justify-content: space-between; padding: 4px 0; }
    .orden-row + .orden-row { border-top: none; }
    .orden-label { color: #666; }
    .orden-val { font-weight: 600; text-align: right; max-width: 60%; }
    .orden-val.price { color: #2D8CFF; font-weight: 800; }
    .orden-divider { border: none; border-top: 1px solid #E3F0FF; margin: 6px 0; }
    .orden-actions { display: flex; gap: 7px; margin-top: 12px; }
    .btn-confirm { flex: 1; background: #0C8C7E; color: #fff; border: none; border-radius: 9px; padding: 10px; font-weight: 700; font-size: 12px; }
    .btn-modify { background: #F1F3F6; border: 1px solid #E3F0FF; border-radius: 9px; padding: 10px 13px; font-size: 12px; color: #555; font-weight: 600; }
    .orden-confirmed { background: #DFFAF7; border-radius: 7px; padding: 8px 12px; text-align: center; font-size: 12px; color: #0C8C7E; font-weight: 600; }

    /* ── ONBOARDING ── */
    .onb-center { text-align: center; margin-bottom: 22px; }
    .onb-icon { width: 46px; height: 46px; background: #2D8CFF; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin: 0 auto 10px; font-size: 20px; }
    .onb-steps { display: flex; background: #fff; border: 1px solid #E3F0FF; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
    .onb-step { flex: 1; padding: 9px 4px; text-align: center; font-size: 10px; font-weight: 600; border-right: 1px solid #E3F0FF; }
    .onb-step:last-child { border-right: none; }
    .onb-step.active { background: #2D8CFF; color: #fff; }
    .onb-step.done { color: #0C8C7E; }
    .onb-step.todo { color: #999; }
    .onb-card { background: #fff; border: 1px solid #E3F0FF; border-radius: 14px; padding: 22px; }
    .form-label { font-size: 12px; font-weight: 600; color: #444; display: block; margin-bottom: 5px; }
    .form-input { width: 100%; padding: 10px 12px; border: 1px solid #E3F0FF; border-radius: 9px; font-size: 13px; outline: none; margin-bottom: 14px; }
    .form-input:focus { border-color: #2D8CFF; }
    .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .cat-btn { padding: 11px; border-radius: 9px; font-size: 12px; font-weight: 600; transition: all .15s; }
    .cat-btn.selected { border: 2px solid #2D8CFF; background: #E3F0FF; color: #2D8CFF; }
    .cat-btn.unselected { border: 1px solid #E3F0FF; background: #fff; color: #444; }
    .tip-box { background: #DFFAF7; border-radius: 9px; padding: 11px 13px; font-size: 11px; color: #0C8C7E; font-weight: 600; }
    .success-box { text-align: center; padding: 8px 0; }
    .success-emoji { font-size: 42px; margin-bottom: 10px; }
    .next-steps { background: #F1F3F6; border-radius: 9px; padding: 11px; text-align: left; margin-bottom: 14px; }
    .next-step-item { font-size: 12px; color: #444; padding: 3px 0; }
    .btn-primary { width: 100%; background: #2D8CFF; color: #fff; border: none; border-radius: 11px; padding: 13px; font-weight: 700; font-size: 14px; margin-top: 10px; }
  </style>
</head>

<script>
// ── CONFIGURACIÓN BACKEND ───────────────────────────────────────────────────
// Cuando tengas desplegado el backend en Vercel, reemplaza esta URL.
// Mientras no esté configurada, el sistema cae al motor de palabras clave (funciona igual).
const BACKEND_URL = "https://clicity-demo-back.vercel.app";

async function llamarBackend(system, messages) {
  const url = `${BACKEND_URL}/api/chat`;
  const res = await fetch(url, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ system, messages })
  });
  if (!res.ok) throw new Error(`Backend HTTP ${res.status}`);
  const data = await res.json();
  if (!data.text) throw new Error("Backend sin texto");
  return data.text;
}

function normalizar(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

function buscarProductos(query) {
  if (!query.trim()) return [];
  const q = normalizar(query).replace(/[.,;:!?¿¡()"']/g, " ");
  const keywords = q.split(/\s+/).filter(k => k.length > 2 && !STOPWORDS.has(k));
  if (!keywords.length) return [];
  const expanded = [...keywords];
  keywords.forEach(k => { if (SINONIMOS[k]) expanded.push(...SINONIMOS[k]); });
  const results = [];
  COMERCIOS.forEach(c => {
    c.productos.forEach(p => {
      let score = 0;
      const txt = normalizar(p.nombre + " " + p.tags.join(" ") + " " + c.categoria);
      const words = new Set(txt.split(/[\s\-\(\)\.,;:]+/));
      expanded.forEach(kw => { if (words.has(kw)) score += kw.length > 4 ? 2 : 1; });
      if (score > 0) results.push({ producto: p, comercio: c, score });
    });
  });
  return results.sort((a, b) => b.score - a.score).slice(0, 8);
}

function intentarExtraerJSON(raw) {
  if (!raw) return null;
  try { return JSON.parse(raw.trim()); } catch {}
  const start = raw.indexOf("{");
  const end = raw.lastIndexOf("}");
  if (start !== -1 && end !== -1 && end > start) {
    try { return JSON.parse(raw.slice(start, end + 1)); } catch {}
  }
  return null;
}

function resumenCatalogo() {
  return COMERCIOS.map(c => {
    const precios = c.productos.map(p => p.precio);
    const min = Math.min(...precios), max = Math.max(...precios);
    const ejemplos = c.productos.slice(0, 3).map(p => p.nombre).join(", ");
    return `- ${c.nombre} [id:${c.id}] (${c.categoria}): ${ejemplos}. Precios desde $${min.toLocaleString("es-CO")} hasta $${max.toLocaleString("es-CO")}. ⭐${c.calificacion} (${c.resenias} reseñas). Horario: ${c.horario}. Dirección: ${c.direccion}.`;
  }).join("\n");
}

2. Cuando ya tengas contexto suficiente, responde ÚNICAMENTE con un JSON (sin texto antes ni después) con esta forma exacta:
{"tipo":"recomendaciones","mensaje":"una frase breve de introducción","opciones":[{"id":"id-exacto-del-catalogo","razon":"una frase corta y específica de por qué esta opción encaja"}]}

}

function agregarHistorial(q) {

// Heurística de aclaración para el modo sin IA (fallback): decide si conviene
// preguntar algo antes de recomendar, igual que haría el agente real.
function necesitaAclaracion(resultados) {
  if (state.agentePendienteAclarar) return null; // ya preguntamos una vez en esta búsqueda, no insistir
  if (!resultados.length) return null;

  const textoCompleto = (state.agenteMsgs[state.agenteMsgs.length - 1]?.text || "");
  const tieneNumero = /\$|\bpesos\b|\d{4,}/i.test(textoCompleto);
  const categorias = [...new Set(resultados.map(r => r.comercio.categoria))];
  const precios = resultados.map(r => r.producto.precio);
  const rangoAmplio = precios.length > 2 && (Math.max(...precios) - Math.min(...precios)) > Math.min(...precios) * 1.2;

  if (categorias.length >= 3) {
    return `Encontré opciones en varios tipos de comercio (${categorias.slice(0, 3).join(", ")}${categorias.length > 3 ? "..." : ""}). ¿Qué es lo más importante para ti — precio, cercanía o un tipo de lugar en especial?`;
  }
  if (!tieneNumero && rangoAmplio) {
    return `Tengo varias opciones con precios bastante distintos. ¿Cuál es tu presupuesto aproximado?`;
  }
  return null;
}

async function enviarAgente(textoForzado) {
  const enConversacion = state.agenteMsgs.length > 0;
  const inputId = enConversacion ? "agent-input-2" : "agent-input";
  const inp = document.getElementById(inputId);
  const texto = (textoForzado !== undefined ? textoForzado : (inp ? inp.value.trim() : "")).trim();
  if (!texto || state.agenteLoading) return;
  if (inp) inp.value = "";

  agregarHistorial(texto);
  state.agenteMsgs.push({ role: "user", text: texto });
  state.agenteLoading = true;
  renderBuscar();

  const messages = state.agenteMsgs
    .filter(m => m.role !== "recomendaciones")
    .map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.text || "" }))
    .filter(m => m.content);

  try {
    const raw = await llamarBackend(agenteSystemPrompt(), messages);
    const parsed = intentarExtraerJSON(raw);
    if (parsed && parsed.tipo === "recomendaciones" && Array.isArray(parsed.opciones) && parsed.opciones.length) {
      state.agenteMsgs.push({ role: "recomendaciones", data: parsed });
    } else if (raw.trim()) {
      state.agenteMsgs.push({ role: "assistant", text: raw.trim() });
    } else {
      throw new Error("respuesta_vacia");
    }
  } catch (e) {
    // FALLBACK: si la IA no responde (p.ej. fuera de Claude.ai), usamos el motor de palabras clave,
    // pero replicando el mismo patrón de "preguntar antes de recomendar" cuando la consulta es ambigua.
    const consultaCombinada = state.agentePendienteAclarar ? `${state.agentePendienteAclarar} ${texto}` : texto;
    const resultados = buscarProductos(consultaCombinada);
    const pregunta = necesitaAclaracion(resultados);

    if (pregunta) {
      state.agentePendienteAclarar = texto;
      state.agenteMsgs.push({ role: "assistant", text: pregunta });
    } else if (resultados.length) {
      state.agentePendienteAclarar = null;
      const vistos = new Set();
      const opciones = [];
      resultados.forEach(({ comercio }) => {
        if (!vistos.has(comercio.id) && opciones.length < 4) {
          vistos.add(comercio.id);
          opciones.push({ id: comercio.id, razon: "" });
        }
      });
      state.agenteMsgs.push({ role: "recomendaciones", data: { tipo: "recomendaciones", mensaje: "Esto encontré para ti:", opciones } });
    } else {
      state.agentePendienteAclarar = null;
      state.agenteMsgs.push({ role: "assistant", text: "No encontré coincidencias todavía. ¿Puedes contarme un poco más sobre lo que necesitas?" });
    }
  }

  state.agenteLoading = false;
  renderBuscar();
}

function toggleVoz(inputId) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const btn = document.getElementById(inputId === "agent-input" ? "mic-btn" : "mic-btn-2");
  if (!SpeechRecognition) {
    if (btn) { const old = btn.textContent; btn.textContent = "🚫"; setTimeout(() => btn.textContent = old, 1500); }
    return;
  }
  const inp = document.getElementById(inputId);
  const rec = new SpeechRecognition();
  rec.lang = "es-CO";
  rec.interimResults = false;
  if (btn) btn.classList.add("listening");
  rec.onresult = e => { if (inp) inp.value = e.results[0][0].transcript; };
  rec.onerror = () => {};
  rec.onend = () => { if (btn) btn.classList.remove("listening"); };
  rec.start();
}

function activarUbicacion() {
  state.ubicacionActiva = true;
  if (navigator.geolocation) navigator.geolocation.getCurrentPosition(() => {}, () => {});
  renderBuscar();
}

// ── RENDER: PERFIL ───────────────────────────────────────────────────────────
function renderPerfil() {
  const c = state.comercioActivo;
  if (!c) return;
  const el = document.getElementById("view-perfil");
  el.innerHTML = `
    <button class="back-btn" onclick="volverAgente()">← Volver</button>
    <div class="perfil-header">
      <span class="cat-badge">${c.categoria}</span>
      <div class="perfil-titulo-row">
        ${c.logo ? `<img class="perfil-logo" src="${c.logo}" alt="${escHtml(c.nombre)}" loading="lazy">` : ""}
        <h2 class="perfil-nombre">${escHtml(c.nombre)}</h2>
      </div>
      <p class="perfil-desc">${escHtml(c.descripcion)}</p>
      <div class="perfil-meta">
        <span>📍 ${escHtml(c.direccion)}</span>
        <span>🕐 ${escHtml(c.horario)}</span>
        <span>⭐ ${c.calificacion} (${c.resenias} reseñas)</span>
        <a class="wa-link" href="https://wa.me/57${c.whatsapp}" target="_blank">💬 WhatsApp</a>
      </div>
    </div>
    <p class="section-label">Productos disponibles</p>
    <div class="productos-grid">
      ${c.productos.map(p => `
        <div class="prod-card">
          <div class="prod-emoji">${p.img ? `<img src="${p.img}" alt="${escHtml(p.nombre)}" loading="lazy">` : p.foto}</div>
          <p class="prod-nombre">${escHtml(p.nombre)}</p>
          <p class="prod-precio">$${p.precio.toLocaleString("es-CO")}</p>
          <p style="font-size:10px;color:#888;margin-top:2px">${p.stock} disponibles</p>
        </div>`).join("")}
    </div>
    <div class="chat-box">
      <div class="chat-header">
        <div class="chat-avatar">✨</div>
        <div>
          <p class="chat-header-title">Asistente IA · ${escHtml(c.nombre)}</p>
          <p class="chat-header-sub">Responde al instante · Toma pedidos y reservas</p>
        </div>
      </div>
      <div class="chat-messages" id="chat-msgs"></div>
      <div class="chat-input-row">
        <input class="chat-input" id="chat-input" type="text" placeholder="Pregunta o pide algo..." />
        <button class="btn-send" id="btn-send" onclick="enviarChat()">Enviar</button>
      </div>
      <div class="chat-chips">
        <button class="chat-chip order" onclick="setChat('Quiero pedir uno')">🛒 Quiero pedir uno</button>
        <button class="chat-chip order" onclick="setChat('Quiero reservar una cita')">📅 Reservar cita</button>
        <button class="chat-chip info" onclick="setChat('¿Hacen domicilio?')">¿Hacen domicilio?</button>
        <button class="chat-chip info" onclick="setChat('¿Aceptan Nequi?')">¿Aceptan Nequi?</button>
      </div>
    </div>`;

  const chatInput = document.getElementById("chat-input");
  if (chatInput) chatInput.addEventListener("keydown", e => { if (e.key === "Enter") enviarChat(); });
  renderChatMsgs();
}

function setChat(txt) {
  const inp = document.getElementById("chat-input");
  if (inp) { inp.value = txt; inp.focus(); }
}

function renderChatMsgs() {
  const el = document.getElementById("chat-msgs");
  if (!el) return;
  let html = "";
  state.chatMsgs.forEach((m, i) => {
    if (m.role === "orden") {
      html += renderOrdenCard(m.data, i);
    } else {
      const cls = m.role === "user" ? "user" : "assistant";
      html += `<div class="msg-row ${cls}"><div class="msg-bubble ${cls}">${escHtml(m.text)}</div></div>`;
    }
  });
  if (state.chatLoading) {
    html += `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;

  // Botones de la orden card
  el.querySelectorAll("[data-confirm]").forEach(btn => {
    btn.addEventListener("click", () => confirmarOrden(parseInt(btn.dataset.confirm)));
  });
  el.querySelectorAll("[data-modify]").forEach(btn => {
    btn.addEventListener("click", () => {
      state.chatMsgs.push({ role:"assistant", text:"Sin problema, dime qué quieres cambiar del pedido." });
      renderChatMsgs();
    });
  });
}

function renderOrdenCard(o, idx) {
  const esReserva = o.tipo === "reserva";
  const confirmado = o._confirmado;
  let rows = "";
  if (esReserva) {
    rows += row("Servicio", o.servicio) + row("Fecha", o.fecha);
  } else {
    rows += row("Producto", o.producto) + row("Cantidad", o.cantidad);
    if (o.precio > 0) rows += row("Total", "$" + (o.precio * o.cantidad).toLocaleString("es-CO"), true);
    rows += row("Entrega", o.entrega);
    if (o.direccion) rows += row("Dirección", o.direccion);
  }
  rows += `<hr class="orden-divider">` + row("Cliente", o.nombre) + row("Teléfono", o.telefono);
  const actions = confirmado
    ? `<div class="orden-confirmed">✓ ${esReserva ? "Reserva enviada" : "Pedido enviado"} al comercio</div>`
    : `<div class="orden-actions">
        <button class="btn-confirm" data-confirm="${idx}">${esReserva ? "Confirmar reserva" : "Confirmar pedido"}</button>
        <button class="btn-modify" data-modify="${idx}">Modificar</button>
      </div>`;
  return `<div class="orden-card"><p class="orden-title">${esReserva ? "📅 Confirmar reserva" : "🛒 Confirmar pedido"}</p>${rows}${actions}</div>`;
}

function row(label, val, isPrice) {
  return `<div class="orden-row"><span class="orden-label">${label}</span><span class="orden-val${isPrice ? " price" : ""}">${escHtml(String(val))}</span></div>`;
}

function confirmarOrden(idx) {
  const o = state.chatMsgs[idx].data;
  o._confirmado = true;
  const esReserva = o.tipo === "reserva";
  state.chatMsgs.push({ role:"assistant", text: esReserva
    ? `¡Reserva confirmada! Te esperamos ${o.fecha}. Te contactamos al ${o.telefono}. ¡Hasta pronto!`
    : `¡Pedido confirmado! 🎉 En breve te contactamos al ${o.telefono} para coordinar. Gracias por comprar en ${state.comercioActivo.nombre}.`
  });
  renderChatMsgs();
}

// ── CHAT IA ──────────────────────────────────────────────────────────────────
async function enviarChat() {
  const inp = document.getElementById("chat-input");
  const btn = document.getElementById("btn-send");
  if (!inp || state.chatLoading) return;
  const userMsg = inp.value.trim();
  if (!userMsg) return;
  inp.value = "";
  state.chatMsgs.push({ role:"user", text:userMsg });
  state.chatLoading = true;
  if (btn) btn.disabled = true;
  renderChatMsgs();

  const c = state.comercioActivo;
  const messages = state.chatMsgs
    .filter(m => m.role !== "orden")
    .map(m => ({ role: m.role === "assistant" ? "assistant" : "user", content: m.text || "" }))
    .filter(m => m.content);

  const systemComercio = `Eres el asistente virtual de ${c.nombre} en Manizales, Colombia. Respondes preguntas Y tomas pedidos en el chat.

DATOS DEL NEGOCIO:
- Categoría: ${c.categoria}
- Dirección: ${c.direccion}
- Horario de atención: ${c.horario}
- Calificación: ${c.calificacion} (${c.resenias} reseñas)
- WhatsApp: ${c.whatsapp}

SOBRE EL NEGOCIO: ${c.contexto}

PRODUCTOS:
${c.productos.map(p => `- ${p.nombre}: $${p.precio.toLocaleString("es-CO")} (${p.stock} en stock)`).join("\n")}

REGLAS: sé amable y directo. Máximo 3-4 líneas. No inventes productos ni precios. Usa los DATOS DEL NEGOCIO de arriba para responder preguntas de horario, dirección o ubicación — esa información siempre está disponible, nunca digas que no la tienes.

TOMAR PEDIDOS: Si el cliente quiere comprar, recolecta UNO POR UNO: 1) producto y cantidad 2) nombre completo 3) teléfono 4) ¿recoge en tienda o domicilio? (si domicilio, pide dirección).
Cuando tengas TODO responde SOLO este JSON sin texto adicional:
{"tipo":"pedido","producto":"...","cantidad":1,"precio":0,"nombre":"...","telefono":"...","entrega":"recoge en tienda","direccion":""}

RESERVAS: Si quiere cita/turno, pide nombre, teléfono y cuándo. Luego responde SOLO:
{"tipo":"reserva","servicio":"...","nombre":"...","telefono":"...","fecha":"..."}`;

  try {
    const raw = await llamarBackend(systemComercio, messages);
    const jsonMatch = raw.match(/\{[^{}]*"tipo"\s*:\s*"(pedido|reserva)"[^{}]*\}/s);
    if (jsonMatch) {
      try { state.chatMsgs.push({ role:"orden", data: JSON.parse(jsonMatch[0]) }); }
      catch { state.chatMsgs.push({ role:"assistant", text:raw }); }
    } else {
      state.chatMsgs.push({ role:"assistant", text:raw });
    }
  } catch(e) {
    state.chatMsgs.push({ role:"assistant", text:"En este momento no puedo responder. Escríbenos al WhatsApp: " + c.whatsapp });
  }

  state.chatLoading = false;
  if (btn) btn.disabled = false;
  renderChatMsgs();
}

// ── RENDER: ONBOARDING ───────────────────────────────────────────────────────
function renderOnboarding() {
  const el = document.getElementById("view-onboarding");
  const { onbStep, onbData } = state;
  const labels = ["Datos","Categoría","Horario","Listo"];
  const steps = labels.map((l, i) => {
    const cls = i === onbStep ? "active" : i < onbStep ? "done" : "todo";
    return `<div class="onb-step ${cls}">${l}</div>`;
  }).join("");

  let content = "";
  if (onbStep === 0) {
    content = `
      <label class="form-label">Nombre del negocio</label>
      <input class="form-input" id="onb-nombre" type="text" placeholder="Ej: Ferretería El Clavo" value="${escHtml(onbData.nombre)}" />
      <label class="form-label">Dirección</label>
      <input class="form-input" id="onb-dir" type="text" placeholder="Ej: Calle 22 #18-45, Centro" value="${escHtml(onbData.direccion)}" style="margin-bottom:0" />`;
  } else if (onbStep === 1) {
    const cats = ["Ferretería","Salud","Ropa y Moda","Restaurante","Tecnología","Servicios","Supermercado","Otro"];
    content = `<label class="form-label" style="margin-bottom:10px">¿A qué te dedicas?</label>
      <div class="cat-grid">${cats.map(cat =>
        `<button class="cat-btn ${onbData.categoria === cat ? "selected" : "unselected"}" onclick="selectCat('${cat}')">${cat}</button>`
      ).join("")}</div>`;
  } else if (onbStep === 2) {
    content = `
      <label class="form-label">Horario de atención</label>
      <input class="form-input" id="onb-horario" type="text" placeholder="Ej: Lun-Sab 8am-6pm" value="${escHtml(onbData.horario)}" />
      <div class="tip-box">✨ La IA generará las descripciones de tus productos automáticamente desde fotos</div>`;
  } else {
    content = `
      <div class="success-box">
        <div class="success-emoji">🎉</div>
        <h3 style="font-weight:800;color:#0D1B3D;margin-bottom:6px">¡${escHtml(onbData.nombre || "Tu comercio")} está listo!</h3>
        <p style="font-size:12px;color:#666;margin-bottom:16px">Ya apareces en las búsquedas. El asistente IA responde por ti desde ya.</p>
        <div class="next-steps">
          <p class="section-label" style="margin-bottom:6px">Próximos pasos</p>
          ${["📸 Sube fotos de tus productos","💬 Personaliza tu asistente IA","📊 Revisa el dashboard de búsquedas"].map(t => `<p class="next-step-item">${t}</p>`).join("")}
        </div>
        <button class="btn-primary" onclick="goHome()">Ver cómo me ven los clientes</button>
      </div>`;
  }

  el.innerHTML = `
    <button class="back-btn" onclick="goHome()">← Volver</button>
    <div class="onb-center">
      <div class="onb-icon">🏪</div>
      <h2 style="font-size:19px;font-weight:800;color:#0D1B3D;margin-bottom:4px">Registra tu comercio</h2>
      <p style="font-size:12px;color:#888">Activo en menos de 10 minutos. Sin conocimientos técnicos.</p>
    </div>
    <div class="onb-steps">${steps}</div>
    <div class="onb-card">${content}</div>
    ${onbStep < 3 ? `<button class="btn-primary" onclick="onbNext()">${onbStep === 2 ? "Crear mi perfil" : "Continuar →"}</button>` : ""}`;
}

function selectCat(cat) {
  state.onbData.categoria = cat;
  renderOnboarding();
}

function onbNext() {
  if (state.onbStep === 0) {
    state.onbData.nombre = document.getElementById("onb-nombre")?.value || "";
    state.onbData.direccion = document.getElementById("onb-dir")?.value || "";
  } else if (state.onbStep === 2) {
    state.onbData.horario = document.getElementById("onb-horario")?.value || "";
  }
  state.onbStep++;
  renderOnboarding();
}

// ── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── INIT ─────────────────────────────────────────────────────────────────────
renderBuscar();
</script>
